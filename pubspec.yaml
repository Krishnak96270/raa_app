name: raa_app
description: Road Alert Assistant - Smart AI Driving System

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 📍 GPS Location
  geolocator: ^10.1.0

  # 🔊 Voice Alerts
  flutter_tts: ^3.8.0

  # 💾 Local Database
  sqflite: ^2.3.0
  path: ^1.9.0

  # 📊 Motion Detection (Accelerometer)
  sensors_plus: ^4.0.2

  # 📁 File storage (Export / Backup)
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
